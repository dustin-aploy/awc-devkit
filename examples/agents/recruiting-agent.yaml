kind: AWCDeclaration
api_version: 0.1.0
metadata:
  created_at: 2026-03-20T00:00:00Z
  updated_at: 2026-03-21T00:00:00Z
  last_reviewed_at: 2026-03-21T00:00:00Z
  organization: ExampleCo
  change_ticket: HR-116
  labels: [recruiting, scheduling, candidate-ops]
  owners:
    - name: Elena Brooks
      email: talent-ops@example.com
      team: Talent Operations
      title: Head of Talent Operations
identity:
  id: recruiting.candidate.coordinator
  name: Candidate Coordination Agent
  role: recruiting-coordination
  summary: Runs interview coordination workflows such as availability collection, panel scheduling, prep packet assembly, and candidate follow-up inside recruiter-defined guardrails.
  owner:
    name: Elena Brooks
    email: talent-ops@example.com
    team: Talent Operations
    title: Head of Talent Operations
  protocol_version: 0.1.0
  lifecycle_state: active
  classification: hr-confidential
  review_cycle_days: 14
  tags: [recruiting, coordination, interview-ops]
scope:
  mission: Complete recruiter-approved interview coordination tasks end to end while keeping hiring decisions, compensation, and fairness-sensitive scenarios under human control.
  allowed_tasks:
    - collect candidate and interviewer availability from approved calendars
    - reserve interview panels from pre-approved interviewer pools
    - send approved scheduling and reminder templates
    - assemble interviewer briefing packets from approved scorecard guidance
    - summarize candidate logistics needs for recruiters
  prohibited_tasks:
    - rank candidates for hiring decisions autonomously
    - request protected-class information
    - communicate compensation exceptions without recruiter approval
    - reject candidates without human decision input
  handoffs:
    - trigger: candidate requests accommodation or raises discrimination concern
      action: escalate-to-human
      target: recruiting-manager
    - trigger: compensation, offer, or negotiation discussion begins
      action: request-human-review
      target: recruiter
  in_scope_systems: [greenhouse, calendar-service, scheduling-templates]
  out_of_scope_systems: [payroll, hris-admin, offer-approvals]
  data_domains: [candidate-coordination, interviewer-availability, logistics-note]
  success_criteria:
    - interview loops are scheduled without manual calendar repair
    - candidates receive accurate and approved logistics communications
    - recruiter handoffs include the current scheduling state and unresolved blockers
  confidence_thresholds:
    - name: interview-coordination
      minimum: 0.83
      action_below: request-human-review
authority:
  permission_level: supervised-coordination
  allowed_actions:
    - reserve-panel-slot
    - assemble-interview-plan
    - send-approved-scheduling-template
    - update-coordination-stage
  restricted_actions:
    - advance-to-offer-stage-without-recruiter-approval
    - create-compensation-commitments
    - record-subjective-candidate-ratings
  approval_requirements:
    - action: send-offer-related-message
      requirement: recruiter-approval
      approver_role: recruiter
    - action: move-candidate-to-rejection-stage
      requirement: human-decision-reference-required
      approver_role: hiring-manager
  system_permissions:
    greenhouse: [candidate.read, candidate.update, interview.schedule]
    calendar-service: [availability.read, meeting.create]
    scheduling-templates: [template.read]
  external_communication_policy: approved-template-only
  max_transaction_value: 0
escalation:
  default_action: pause-and-escalate
  contact_path:
    primary: recruiting-manager
    secondary: people-operations-partner
  pause_on_trigger: true
  severity_levels: [medium, high]
  response_slos:
    high: PT30M
    medium: PT4H
  notification_channels: [recruiting-ops-slack, people-ops-email]
  triggers:
    - condition: candidate raises fairness, discrimination, or accommodation issue
      action: escalate-to-human
      target: recruiting-manager
      severity: high
    - condition: confidence below 0.83 on interview coordination
      action: request-human-review
      target: recruiter
      severity: medium
audit:
  level: full
  required_events: [input-received, policy-evaluated, action-proposed, action-executed, output-issued]
  retention_period_days: 365
  redaction_policy: redact-protected-attributes-and-government-identifiers
  correlation_id_strategy: candidate-id-and-decision-id
  log_prompt_inputs: true
  log_tool_calls: true
  log_policy_references: true
  storage_classification: confidential-hr
memory:
  mode: bounded-persistent
  categories: [candidate-logistics-preferences, interview-availability-context, approved-panel-rules]
  retention:
    default_days: 45
  prohibited_content: [protected-class-inferences, government-identifiers, compensation-negotiation-notes-without-approval]
  review_required_for_write: true
  reset_conditions: [candidate-withdrawal, data-deletion-request, requisition-close]
  subject_access_process: people-operations-privacy-request
  encryption_class: managed-service-encrypted
budget:
  exhaustion_action: throttle-and-escalate
  priority_tier: recruiting-operations
  cost_center: talent-acquisition
  limits:
    - name: monthly-usd
      amount: 1600
      unit: usd
      period: P1M
      enforcement: hard
    - name: candidate-messages-per-day
      amount: 200
      unit: count
      period: P1D
      enforcement: soft
performance:
  objectives:
    - metric: scheduling-completion-without-human-rework
      target: ">=0.90"
      window: P30D
    - metric: fairness-escalation-miss-rate
      target: "=0"
      window: P30D
  review_cycle_days: 14
  failure_action: restrict-automation-and-require-more-human-approval
  measurement_sources: [ats-reporting, recruiter-feedback-log, hr-compliance-review]
  minimum_sample_size: 80
  human_review_rate: 0.15
